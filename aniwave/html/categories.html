<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northwind Categories</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Northwind Categories</h2>
        <button class="btn btn-primary" data-toggle="modal" data-target="#categoryModal" onclick="prepareAdd()">
            <i class="fas fa-plus"></i> Add Category
        </button>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="thead-dark">
                    <tr>
                        <th>ID</th>
                        <th>Category Name</th>
                        <th>Description</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="categoryTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Category Form</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <form id="categoryForm">
                <div class="modal-body">
                    <input type="hidden" id="categoryId">
                    <div class="form-group">
                        <label>Category Name</label>
                        <input type="text" class="form-control" id="categoryName" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea class="form-control" id="categoryDesc" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-success">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_URL = "http://127.0.0.1/northwindp19kohkonge/api/categories.php";
let isEditMode = false;

$(document).ready(function() {
    loadCategories();

    // Handle Form Submit
    $("#categoryForm").on("submit", function(e) {
        e.preventDefault();
        if (isEditMode) {
            updateCategory();
        } else {
            addCategory();
        }
    });
});

// --- 1. LOAD DATA (GET) ---
function loadCategories() {
    var settings = {
        "url": API_URL,
        "method": "GET",
        "timeout": 0,
    };

    $.ajax(settings).done(function (response) {
        let rows = "";
        // Assuming response is a JSON array
        let data = typeof response === "string" ? JSON.parse(response) : response;
        
        data.forEach(item => {
            rows += `
                <tr>
                    <td>${item.CategoryID || item.id}</td>
                    <td>${item.CategoryName || item.name}</td>
                    <td>${item.Description || item.desc}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-info mr-2" onclick="editCategory(${item.CategoryID || item.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCategory(${item.CategoryID || item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>`;
        });
        $("#categoryTableBody").html(rows);
    });
}

// --- 2. ADD CATEGORY (POST) ---
function prepareAdd() {
    isEditMode = false;
    $("#modalTitle").text("Add New Category");
    $("#categoryForm")[0].reset();
}

function addCategory() {
    var form = new FormData();
    form.append("name", $("#categoryName").val());
    form.append("desc", $("#categoryDesc").val());

    var settings = {
        "url": API_URL,
        "method": "POST",
        "timeout": 0,
        "processData": false,
        "contentType": false,
        "mimeType": "multipart/form-data",
        "data": form
    };

    $.ajax(settings).done(function (response) {
        $("#categoryModal").modal("hide");
        loadCategories();
    });
}

// --- 3. GET SINGLE ROW & PREPARE EDIT ---
function editCategory(id) {
    isEditMode = true;
    $("#modalTitle").text("Edit Category");

    var settings = {
        "url": API_URL + "?id=" + id,
        "method": "GET",
        "timeout": 0,
    };

    $.ajax(settings).done(function (response) {
        let item = typeof response === "string" ? JSON.parse(response) : response;
        // Populate form
        $("#categoryId").val(id);
        $("#categoryName").val(item.CategoryName || item.name);
        $("#categoryDesc").val(item.Description || item.desc);
        $("#categoryModal").modal("show");
    });
}

// --- 4. UPDATE CATEGORY (PUT) ---
function updateCategory() {
    var settings = {
        "url": API_URL,
        "method": "PUT",
        "timeout": 0,
        "headers": {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        "data": {
            "id": $("#categoryId").val(),
            "name": $("#categoryName").val(),
            "desc": $("#categoryDesc").val()
        }
    };

    $.ajax(settings).done(function (response) {
        $("#categoryModal").modal("hide");
        loadCategories();
    });
}

// --- 5. DELETE CATEGORY (DELETE) ---
function deleteCategory(id) {
    if (confirm("Are you sure you want to delete this category?")) {
        var settings = {
            "url": API_URL,
            "method": "DELETE",
            "timeout": 0,
            "headers": {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            "data": {
                "id": id
            }
        };

        $.ajax(settings).done(function (response) {
            loadCategories();
        });
    }
}
</script>

</body>
</html>
